<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#3D6642">
<title>PsychNote AI</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --green:#3D6642;--green-l:#5A8860;--green-ll:#B8D4BB;--green-bg:#F0F5F0;
  --warm:#A8682C;--warm-bg:#FDF5EE;
  --bg:#F3F0EB;--white:#fff;
  --text:#1A1410;--muted:#7A6A58;--border:#DDD3C4;
  --live:#CC3333;--purple:#6644aa;
}
body{font-family:'DM+Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.5;overflow:hidden;height:100vh;display:flex;flex-direction:column}
header{background:var(--green);color:var(--white);padding:env(safe-area-inset-top) 16px 12px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,0.1);z-index:10}
header h1{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600}
.btn-icon{background:none;border:none;color:var(--white);padding:8px;font-size:20px;cursor:pointer}

main{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px}
.card{background:var(--white);border-radius:16px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,0.05);border:1px solid var(--border)}

.search-box{position:relative;margin-bottom:8px}
.search-box input{width:100%;padding:12px 40px 12px 16px;border-radius:12px;border:1px solid var(--border);font-size:16px;outline:none;background:var(--white)}
.search-box i{position:absolute;right:14px;top:14px;color:var(--muted)}

.list-item{display:flex;align-items:center;padding:12px;border-bottom:1px solid var(--border);gap:12px;cursor:pointer}
.list-item:last-child{border:none}
.avatar{width:44px;height:44px;border-radius:12px;background:var(--green-ll);color:var(--green);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:16px}
.list-info{flex:1}
.list-info h3{font-size:16px;margin-bottom:2px}
.list-info p{font-size:13px;color:var(--muted)}

.view{display:none;height:100%;flex-direction:column}
.view.active{display:flex}

.toolbar{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.badge{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;background:var(--green-bg);color:var(--green);border:1px solid var(--green-ll)}
.badge.live{background:#fee;color:var(--live);border-color:#fcc}

textarea{width:100%;border:none;resize:none;font-size:16px;color:var(--text);outline:none;min-height:200px;background:transparent;line-height:1.6}
.summary-box{margin-top:20px;padding:16px;background:var(--warm-bg);border-radius:12px;border-left:4px solid var(--warm);font-size:15px;white-space:pre-wrap}

.fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:28px;background:var(--green);color:var(--white);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(61,102,66,0.4);border:none;font-size:24px;cursor:pointer;z-index:5}

.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.modal-content{background:var(--white);border-radius:20px;width:100%;max-width:400px;padding:24px}
.modal h2{margin-bottom:16px;font-family:'Cormorant Garamond',serif}
.input-group{margin-bottom:16px}
.input-group label{display:block;font-size:12px;margin-bottom:4px;color:var(--muted)}
.input-group input{width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:15px}
.btn-row{display:flex;gap:12px;margin-top:20px}
.btn{flex:1;padding:12px;border-radius:10px;border:none;font-weight:600;font-size:15px;cursor:pointer}
.btn-primary{background:var(--green);color:var(--white)}
.btn-secondary{background:var(--bg);color:var(--text)}

.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:#fff;padding:8px 20px;border-radius:20px;font-size:14px;z-index:200;display:none}
.toast.show{display:block}

/* Icons */
.i-settings::before{content:'⚙'}
.i-back::before{content:'←'}
.i-plus::before{content:'+'}
.i-save::before{content:'✓'}
.i-del::before{content:'✕'}
.i-mic::before{content:'🎤'}
.i-ai::before{content:'✨'}
.i-search::before{content:'🔍'}
</style>
</head>
<body>

<header>
  <button class="btn-icon i-back" id="btnBack" style="visibility:hidden" onclick="goHome()"></button>
  <h1 id="headerTitle">PsychNote AI</h1>
  <button class="btn-icon i-settings" onclick="openModal('modalSettings')"></button>
</header>

<main id="viewHome" class="view active">
  <div class="search-box">
    <input type="text" placeholder="Szukaj pacjenta..." id="inSearch" oninput="renderList()">
    <i class="i-search"></i>
  </div>
  <div id="clientList" style="margin-top:8px"></div>
</main>

<main id="viewClient" class="view">
  <div class="card" style="margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <h2 id="cliName" style="font-family:'Cormorant Garamond',serif">Pacjent</h2>
        <p id="cliInfo" style="font-size:13px;color:var(--muted)">Brak sesji</p>
      </div>
      <button class="btn-icon i-del" style="color:var(--muted)" onclick="deleteClient()"></button>
    </div>
  </div>
  <div id="sessionList"></div>
</main>

<main id="viewSession" class="view">
  <div class="toolbar">
    <div id="badgeLive" class="badge live" style="display:none">LIVE TRANSKRYPCJA</div>
    <div class="badge" id="badgeDate">Data</div>
  </div>
  <div class="card" style="flex:1;display:flex;flex-direction:column">
    <textarea id="txtNote" placeholder="Zacznij pisać lub włącz mikrofon..." oninput="onNoteInput()"></textarea>
    <div id="aiSummary" class="summary-box" style="display:none"></div>
    <div style="display:flex;gap:12px;margin-top:16px">
      <button class="btn btn-secondary i-mic" id="btnMic" onclick="toggleMic()"> Mikrofon</button>
      <button class="btn btn-primary i-ai" id="btnSum" onclick="summarize()"> Podsumuj AI</button>
    </div>
  </div>
</main>

<button class="fab i-plus" id="fabAdd" onclick="handleAdd()"></button>

<div id="modalSettings" class="modal">
  <div class="modal-content">
    <h2>Ustawienia</h2>
    <div class="input-group">
      <label>Supabase URL</label>
      <input type="text" id="setSupaUrl" placeholder="https://...">
    </div>
    <div class="input-group">
      <label>Supabase Anon Key</label>
      <input type="text" id="setSupaKey">
    </div>
    <p style="font-size: 11px; color: var(--muted); margin-bottom: 15px;">
      * Klucz Claude AI jest teraz bezpiecznie zapisany w Cloudflare Workerze.
    </p>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal('modalSettings')">Anuluj</button>
      <button class="btn btn-primary" onclick="saveConfig()">Zapisz</button>
    </div>
  </div>
</div>

<div id="modalClient" class="modal">
  <div class="modal-content">
    <h2>Nowy Pacjent</h2>
    <div class="input-group">
      <label>Imię i Nazwisko</label>
      <input type="text" id="newCliName" placeholder="np. Jan Kowalski">
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal('modalClient')">Anuluj</button>
      <button class="btn btn-primary" onclick="addClient()">Dodaj</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// --- KONFIGURACJA I STATE ---
let config = { supa_url:'', supa_key:'' };
let clients = [];
let curView = 'home';
let curCli = null;
let sess = null;
let sessDirty = false;

// Worker URL - TUTAJ ZMIANA
const WORKER_URL = 'https://api-psychonote.lukaszdylka.workers.dev/api/summarize';

// --- INICJALIZACJA ---
async function init() {
  const saved = localStorage.getItem('pn_cfg');
  if(saved) {
    config = JSON.parse(saved);
    document.getElementById('setSupaUrl').value = config.supa_url;
    document.getElementById('setSupaKey').value = config.supa_key;
    if(config.supa_url && config.supa_key) loadData();
  } else {
    openModal('modalSettings');
  }
}

async function loadData() {
  try {
    const res = await fetch(`${config.supa_url}/rest/v1/clients?select=*&order=name`, {
      headers: { 'apikey': config.supa_key, 'Authorization': `Bearer ${config.supa_key}` }
    });
    clients = await res.json();
    renderList();
  } catch(e) { toast('Błąd Supabase','err'); }
}

function saveConfig() {
  config.supa_url = document.getElementById('setSupaUrl').value.trim();
  config.supa_key = document.getElementById('setSupaKey').value.trim();
  localStorage.setItem('pn_cfg', JSON.stringify(config));
  closeModal('modalSettings');
  loadData();
}

// --- LOGIKA AI (PODSUMOWANIE) ---
async function summarize() {
  if (!sess || !sess.note || sess.note.length < 50) return toast('Notatka za krótka','warn');
  
  const btnSum = document.getElementById('btnSum');
  btnSum.disabled = true; 
  btnSum.textContent = 'Generowanie...';
  
  try {
    // Wysyłamy do Twojego Workera
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ note: sess.note })
    });

    if (!res.ok) throw new Error('Worker error');

    const d = await res.json();
    
    // Obsługa formatu Claude (content[0].text)
    if (d.content && d.content[0] && d.content[0].text) {
      sess.summary = d.content[0].text;
      renderSummary();
      saveNow();
      toast('Podsumowanie gotowe');
    } else {
      throw new Error('Zły format odpowiedzi');
    }
  } catch(e) { 
    console.error(e);
    toast('Błąd AI (Worker)','err'); 
  } finally { 
    btnSum.disabled = false; 
    btnSum.textContent = ' Podsumuj AI'; 
  }
}

function renderSummary() {
  const box = document.getElementById('aiSummary');
  if(sess && sess.summary) {
    box.textContent = sess.summary;
    box.style.display = 'block';
  } else {
    box.style.display = 'none';
  }
}

// --- WIDOKI I RENDEROWANIE ---
function renderList() {
  const term = document.getElementById('inSearch').value.toLowerCase();
  const list = document.getElementById('clientList');
  list.innerHTML = '';
  
  clients.filter(c => c.name.toLowerCase().includes(term)).forEach(c => {
    const div = document.createElement('div');
    div.className = 'list-item card';
    div.onclick = () => openClient(c);
    div.innerHTML = `
      <div class="avatar">${initials(c.name)}</div>
      <div class="list-info">
        <h3>${c.name}</h3>
        <p>Kliknij, aby zobaczyć sesje</p>
      </div>
    `;
    list.appendChild(div);
  });
}

function openClient(c) {
  curCli = c;
  curView = 'client';
  document.getElementById('viewHome').classList.remove('active');
  document.getElementById('viewClient').classList.add('active');
  document.getElementById('btnBack').style.visibility = 'visible';
  document.getElementById('cliName').textContent = c.name;
  document.getElementById('fabAdd').className = 'fab i-plus';
  loadSessions();
}

async function loadSessions() {
  const list = document.getElementById('sessionList');
  list.innerHTML = '<p style="text-align:center;color:var(--muted)">Ładowanie sesji...</p>';
  try {
    const res = await fetch(`${config.supa_url}/rest/v1/sessions?client_id=eq.${curCli.id}&order=created_at.desc`, {
      headers: { 'apikey': config.supa_key, 'Authorization': `Bearer ${config.supa_key}` }
    });
    const sessions = await res.json();
    document.getElementById('cliInfo').textContent = `${sessions.length} sesji`;
    list.innerHTML = '';
    sessions.forEach(s => {
      const div = document.createElement('div');
      div.className = 'list-item card';
      div.onclick = () => openSession(s);
      div.innerHTML = `
        <div class="list-info">
          <h3>Sesja ${new Date(s.created_at).toLocaleDateString()}</h3>
          <p>${s.note ? s.note.substring(0, 60) + '...' : 'Brak notatek'}</p>
        </div>
      `;
      list.appendChild(div);
    });
  } catch(e) { list.innerHTML = 'Błąd ładowania'; }
}

function openSession(s) {
  sess = s;
  curView = 'session';
  document.getElementById('viewClient').classList.remove('active');
  document.getElementById('viewSession').classList.add('active');
  document.getElementById('badgeDate').textContent = new Date(s.created_at).toLocaleString();
  document.getElementById('txtNote').value = s.note || '';
  renderSummary();
  document.getElementById('fabAdd').className = 'fab i-save';
}

function goHome() {
  if(curView === 'session') {
    saveNow();
    openClient(curCli);
  } else {
    curView = 'home';
    document.getElementById('viewClient').classList.remove('active');
    document.getElementById('viewHome').classList.add('active');
    document.getElementById('btnBack').style.visibility = 'hidden';
    document.getElementById('fabAdd').className = 'fab i-plus';
    curCli = null;
  }
}

// --- OPERACJE DANYCH ---
function handleAdd() {
  if(curView === 'home') openModal('modalClient');
  else if(curView === 'client') createSession();
  else if(curView === 'session') { saveNow(); toast('Zapisano'); }
}

async function addClient() {
  const name = document.getElementById('newCliName').value.trim();
  if(!name) return;
  try {
    const res = await fetch(`${config.supa_url}/rest/v1/clients`, {
      method: 'POST',
      headers: { 'apikey': config.supa_key, 'Authorization': `Bearer ${config.supa_key}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
      body: JSON.stringify({ name })
    });
    const [newC] = await res.json();
    clients.unshift(newC);
    closeModal('modalClient');
    renderList();
    openClient(newC);
  } catch(e) { toast('Błąd dodawania','err'); }
}

async function createSession() {
  try {
    const res = await fetch(`${config.supa_url}/rest/v1/sessions`, {
      method: 'POST',
      headers: { 'apikey': config.supa_key, 'Authorization': `Bearer ${config.supa_key}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
      body: JSON.stringify({ client_id: curCli.id, note: '' })
    });
    const [newS] = await res.json();
    openSession(newS);
  } catch(e) { toast('Błąd sesji','err'); }
}

function onNoteInput() {
  sess.note = document.getElementById('txtNote').value;
  sessDirty = true;
}

async function saveNow() {
  if(!sess) return;
  try {
    await fetch(`${config.supa_url}/rest/v1/sessions?id=eq.${sess.id}`, {
      method: 'PATCH',
      headers: { 'apikey': config.supa_key, 'Authorization': `Bearer ${config.supa_key}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ note: sess.note, summary: sess.summary })
    });
    sessDirty = false;
  } catch(e) { console.error('Auto-save failed'); }
}

async function deleteClient() {
  if(!confirm('Czy na pewno usunąć pacjenta i wszystkie jego sesje?')) return;
  try {
    await fetch(`${config.supa_url}/rest/v1/clients?id=eq.${curCli.id}`, {
      method: 'DELETE',
      headers: { 'apikey': config.supa_key, 'Authorization': `Bearer ${config.supa_key}` }
    });
    clients = clients.filter(c => c.id !== curCli.id);
    goHome();
  } catch(e) { toast('Błąd usuwania','err'); }
}

// --- MIKROFON (SPEECH TO TEXT) ---
let recognition;
let isLive = false;

function toggleMic() {
  if (isLive) {
    recognition.stop();
    return;
  }

  const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!Speech) return toast('Brak obsługi mowy w tej przeglądarce','err');

  recognition = new Speech();
  recognition.lang = 'pl-PL';
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onstart = () => {
    isLive = true;
    document.getElementById('btnMic').classList.add('btn-primary');
    document.getElementById('badgeLive').style.display = 'block';
  };

  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; ++i) {
      if (e.results[i].isFinal) {
        document.getElementById('txtNote').value += ' ' + e.results[i][0].transcript;
        onNoteInput();
      }
    }
  };

  recognition.onend = () => {
    isLive = false;
    document.getElementById('btnMic').classList.remove('btn-primary');
    document.getElementById('badgeLive').style.display = 'none';
  };

  recognition.start();
}

// --- UTILS ---
function openModal(id) { document.getElementById(id).style.display = 'flex'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }
function initials(name) { return name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0,2); }
function toast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show';
  setTimeout(() => t.className = 'toast', 3000);
}

// Auto-save co 15 sekund jeśli zmieniono
setInterval(() => { if(sessDirty) saveNow(); }, 15000);

init();

// Service Worker Registration
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>

</body>
</html>
